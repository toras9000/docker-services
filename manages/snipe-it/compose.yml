name: docker-services-snipe-it
services:
  db:
    image: mysql:8
    restart: unless-stopped
    networks:
      default:
        aliases:
          - snipe-it-db-container
    healthcheck:
      test: mysqladmin ping --host=localhost --user=$${MYSQL_USER} || exit 1
      start_period: 180s
      start_interval: 5s
      timeout: 5s
      interval: 300s
      retries: 3
    volumes:
      - type: bind
        source: ./assets/mysql.conf
        target: /etc/mysql/conf.d/my.cnf
        read_only: true
        bind:
          create_host_path: false
      - type: volume
        source: snipe-it-db-data
        target: /var/lib/mysql
    environment:
      - TZ=Asia/Tokyo
      - MYSQL_ROOT_PASSWORD=snipe_it_rootpass
      - MYSQL_DATABASE=snipe_it_store
      - MYSQL_USER=snipe_it_user
      - MYSQL_PASSWORD=snipe_it_pass

  app:
    image: snipe/snipe-it:v7.1.15
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
      composes-frontend:
        aliases:
          - snipe-it-app-container
    healthcheck:
      test: curl -f -s http://localhost:80 || exit 1
      start_period: 60s
      start_interval: 3s
      timeout: 5s
      interval: 300s
      retries: 3
    volumes:
      - type: volume
        source: snipe-it-app-data
        target: /var/lib/snipeit
    environment:
      - TZ=Asia/Tokyo
      - PHP_UPLOAD_LIMIT=100
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=base64:2+peD5ZWWTQL/k3NHfWM7SvjeQwyWAxfbunqOKjYxe4=
      - APP_URL=https://snipe-it.myserver.home
      - APP_TIMEZONE=Asia/Tokyo
      - APP_LOCALE=ja-JP
      - MAX_RESULTS=500
      - PRIVATE_FILESYSTEM_DISK=local
      - PUBLIC_FILESYSTEM_DISK=local_public
      - DB_CONNECTION=mysql
      - DB_HOST=snipe-it-db-container
      - DB_PORT=3306
      - DB_DATABASE=snipe_it_store
      - DB_USERNAME=snipe_it_user
      - DB_PASSWORD=snipe_it_pass
      - DB_CHARSET=utf8mb4
      - DB_COLLATION=utf8mb4_unicode_ci
      - MAIL_MAILER=log
      - MAIL_HOST=localhost
      - MAIL_PORT=587
      - MAIL_USERNAME=YOURUSERNAME
      - MAIL_PASSWORD=YOURPASSWORD
      - MAIL_FROM_ADDR=admin@example.com
      - MAIL_FROM_NAME='Snipe-IT'
      - MAIL_REPLYTO_ADDR=admin@example.com
      - MAIL_REPLYTO_NAME='Snipe-IT'
      - MAIL_AUTO_EMBED_METHOD='attachment'
      - MAIL_TLS_VERIFY_PEER=true

volumes:
  snipe-it-db-data:
    external: true
  snipe-it-app-data:
    external: true

networks:
  composes-frontend:
    external: true
