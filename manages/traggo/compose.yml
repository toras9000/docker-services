services:
  app:
    image: traggo/server:0.6.0
    restart: unless-stopped
    networks:
      composes-frontend:
        aliases:
          - traggo-app-container
    volumes:
      - type: volume
        source: traggo-app-data
        target: /opt/traggo/data
    environment:
      - TZ=Asia/Tokyo
      - TRAGGO_DEFAULT_USER_NAME=admin
      - TRAGGO_DEFAULT_USER_PASS=admin-pass

volumes:
  traggo-app-data:
    external: true

networks:
  composes-frontend:
    external: true
